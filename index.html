<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>창세기 골든벨 암기 카드</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
</style>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --gold: #d4a832;
    --gold2: #f0c842;
    --accent: #c0392b;
    --text: #e8dcc8;
    --text-dim: #8b7d6b;
    --border: #2a3140;
    --correct: #27ae60;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(212,168,50,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(192,57,43,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    padding: 40px 0 32px;
  }

  .header-badge {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(212,168,50,0.4);
    padding: 4px 14px;
    border-radius: 40px;
    margin-bottom: 16px;
  }

  header h1 {
    font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 6px;
  }

  header h1 span {
    color: var(--gold);
  }

  header p {
    font-size: 13px;
    color: var(--text-dim);
  }

  /* Progress bar */
  .progress-wrap {
    margin: 0 0 24px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .progress-info strong {
    color: var(--gold);
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Score chips */
  .score-chips {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  .chip {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }

  .chip-value {
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }

  .chip-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .chip.correct .chip-value { color: var(--correct); }
  .chip.wrong .chip-value { color: var(--accent); }
  .chip.remain .chip-value { color: var(--gold); }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
    transition: border-color 0.3s;
  }

  .card.revealed {
    border-color: rgba(212,168,50,0.3);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .q-number {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--gold);
    background: rgba(212,168,50,0.12);
    border: 1px solid rgba(212,168,50,0.3);
    padding: 3px 10px;
    border-radius: 30px;
    white-space: nowrap;
  }

  .q-progress-text {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: auto;
  }

  .card-body {
    padding: 28px 24px 24px;
  }

  .question-text {
    font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    font-size: clamp(15px, 3vw, 18px);
    font-weight: 500;
    letter-spacing: -0.2px;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 24px;
  }

  /* Answer area */
  .answer-area {
    background: rgba(212,168,50,0.06);
    border: 1px solid rgba(212,168,50,0.2);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .answer-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    padding: 8px 16px 6px;
    border-bottom: 1px solid rgba(212,168,50,0.15);
    background: rgba(212,168,50,0.04);
  }

  .answer-text {
    padding: 14px 16px;
    font-size: 17px;
    font-weight: 700;
    color: var(--gold2);
    font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    letter-spacing: -0.2px;
    line-height: 1.6;
    display: none;
  }

  .answer-hidden {
    padding: 14px 16px;
    font-size: 14px;
    color: var(--text-dim);
    font-style: italic;
  }

  .card.revealed .answer-text { display: block; }
  .card.revealed .answer-hidden { display: none; }

  /* Buttons */
  .card-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    min-width: 100px;
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn:active { transform: scale(0.97); }

  .btn-reveal {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #1a1208;
  }

  .btn-reveal:hover { filter: brightness(1.1); }

  .btn-correct {
    background: rgba(39,174,96,0.15);
    border: 1px solid rgba(39,174,96,0.4);
    color: #4eca7e;
  }

  .btn-correct:hover { background: rgba(39,174,96,0.25); }

  .btn-wrong {
    background: rgba(192,57,43,0.15);
    border: 1px solid rgba(192,57,43,0.4);
    color: #e74c3c;
  }

  .btn-wrong:hover { background: rgba(192,57,43,0.25); }

  .btn-next {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    flex: 2;
  }

  .btn-next:hover { border-color: var(--gold); color: var(--gold); }

  .action-row-top {
    margin-bottom: 10px;
  }

  /* Result screen */
  #result-screen {
    display: none;
    text-align: center;
  }

  .result-title {
    font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .result-subtitle {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 32px;
  }

  .result-score-big {
    background: var(--surface);
    border: 2px solid rgba(212,168,50,0.4);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 24px;
  }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: conic-gradient(var(--gold) 0%, transparent 0%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    position: relative;
  }

  .score-circle-inner {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-pct {
    font-size: 26px;
    font-weight: 700;
    color: var(--gold2);
    line-height: 1;
  }

  .score-pct-label {
    font-size: 11px;
    color: var(--text-dim);
  }

  .result-stats {
    display: flex;
    gap: 16px;
    justify-content: center;
  }

  .result-stat {
    text-align: center;
  }

  .result-stat-val {
    font-size: 28px;
    font-weight: 700;
  }

  .result-stat-val.c { color: var(--correct); }
  .result-stat-val.w { color: var(--accent); }

  .result-stat-label {
    font-size: 12px;
    color: var(--text-dim);
  }

  .result-divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }

  .btn-restart {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #1a1208;
    border: none;
    border-radius: 12px;
    padding: 14px 32px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    cursor: pointer;
    margin: 0 8px 12px;
    transition: all 0.2s;
  }

  .btn-restart:hover { filter: brightness(1.1); }

  .btn-restart-outline {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 32px;
    font-size: 15px;
    font-weight: 500;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    cursor: pointer;
    margin: 0 8px 12px;
    transition: all 0.2s;
  }

  .btn-restart-outline:hover { border-color: var(--gold); color: var(--gold); }

  /* Wrong list */
  .wrong-list {
    margin-top: 28px;
    text-align: left;
  }

  .wrong-list-title {
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 12px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .wrong-list-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .wrong-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    font-size: 13px;
  }

  .wrong-item-q {
    color: var(--text-dim);
    margin-bottom: 6px;
    line-height: 1.5;
  }

  .wrong-item-a {
    color: var(--gold2);
    font-weight: 500;
  }

  /* Start screen */
  #start-screen {
    text-align: center;
    padding: 40px 0;
  }

  .start-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .start-desc {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.8;
    margin-bottom: 32px;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }

  .mode-options {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .mode-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 14px;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn:hover, .mode-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(212,168,50,0.07);
  }

  .btn-start {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #1a1208;
    border: none;
    border-radius: 12px;
    padding: 16px 48px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-start:hover { filter: brightness(1.1); transform: translateY(-1px); }

  /* Emoji */
  .emoji { font-style: normal; }

  /* Fade anim */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeUp 0.3s ease; }

  /* Reveal anim */
  @keyframes revealAns {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card.revealed .answer-text { animation: revealAns 0.25s ease; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-badge">📖 성경골든벨 100문제</div>
    <h1>창세기 <span>26~50장</span> 암기카드</h1>
    <p>문제를 보고 스스로 생각한 뒤 답을 확인해보세요</p>
  </header>

  <!-- Start Screen -->
  <div id="start-screen">
    <div class="start-icon">✝️</div>
    <p class="start-desc">
      창세기 26~50장을 기반으로 한 골든벨 예상 100문제입니다.<br>
      문제를 풀고 맞은 개수를 확인해 보세요.
    </p>
    <div class="mode-options">
      <button class="mode-btn active" data-count="100" onclick="selectCount(this, 100)">전체 100문제</button>
      <button class="mode-btn" data-count="50" onclick="selectCount(this, 50)">랜덤 50문제</button>
      <button class="mode-btn" data-count="30" onclick="selectCount(this, 30)">랜덤 30문제</button>
      <button class="mode-btn" data-count="10" onclick="selectCount(this, 10)">랜덤 10문제</button>
    </div>
    <button class="btn-start" onclick="startQuiz()">🔔 시작하기</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz-screen" style="display:none;">
    <div class="progress-wrap">
      <div class="progress-info">
        <span>진행률</span>
        <strong id="prog-text">0 / 0</strong>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div class="score-chips">
      <div class="chip correct">
        <div class="chip-value" id="score-c">0</div>
        <div class="chip-label">✅ 맞음</div>
      </div>
      <div class="chip wrong">
        <div class="chip-value" id="score-w">0</div>
        <div class="chip-label">❌ 틀림</div>
      </div>
      <div class="chip remain">
        <div class="chip-value" id="score-r">0</div>
        <div class="chip-label">📋 남은 문제</div>
      </div>
    </div>

    <div id="card-area"></div>
  </div>

  <!-- Result Screen -->
  <div id="result-screen">
    <div class="result-title">🎉 완료!</div>
    <p class="result-subtitle">모든 문제를 풀었습니다. 결과를 확인하세요.</p>

    <div class="result-score-big">
      <div class="score-circle" id="score-circle">
        <div class="score-circle-inner">
          <div class="score-pct" id="res-pct">0%</div>
          <div class="score-pct-label">정답률</div>
        </div>
      </div>
      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-val c" id="res-c">0</div>
          <div class="result-stat-label">맞은 문제</div>
        </div>
        <div class="result-divider"></div>
        <div class="result-stat">
          <div class="result-stat-val w" id="res-w">0</div>
          <div class="result-stat-label">틀린 문제</div>
        </div>
        <div class="result-divider"></div>
        <div class="result-stat">
          <div class="result-stat-val" id="res-total" style="color:var(--gold)">0</div>
          <div class="result-stat-label">총 문제</div>
        </div>
      </div>
    </div>

    <button class="btn-restart" onclick="startQuiz()">🔄 다시 풀기</button>
    <button class="btn-restart-outline" onclick="goHome()">🏠 처음으로</button>

    <div class="wrong-list" id="wrong-list-area"></div>
  </div>

</div>

<script>
const ALL_QUESTIONS = [
  {q:"하나님께서 이삭에게 나타나 아브라함에게 하신 약속을 다시 확인하시며 그가 머물도록 하신 땅은 어디일까요?", a:"그랄"},
  {q:"이삭은 사람들의 위험을 피하기 위해 자신의 아내 리브가를 어떤 관계라고 속였을까요?", a:"누이"},
  {q:"이삭이 부유해지자 사람들이 시기하여 막아버린 것은 무엇이었을까요?", a:"우물"},
  {q:"이삭이 판 우물 중에서 처음으로 다툼이 일어나 '다툼'이라는 뜻으로 이름 붙인 우물은 에섹입니다. 이후 더 이상 다툼이 없어 하나님이 넓게 하셨다고 고백하며 지은 우물 이름은 무엇일까요?", a:"르호봇"},
  {q:"이삭이 기근을 피해 머물렀던 블레셋 지역의 왕으로, 아브라함 때에도 등장했던 왕의 이름은 무엇일까요?", a:"아비멜렉"},
  {q:"하나님께서 이삭에게 나타나 '두려워하지 말라'고 하시며 아브라함에게 약속하신 복을 다시 확인해 주신 장소는 어디일까요?", a:"브엘세바"},
  {q:"에서가 결혼한 이방 여인들은 부모에게 어떤 마음을 주었을까요?", a:"근심과 마음의 고통"},
  {q:"야곱이 아버지 이삭의 축복을 받기 위해 사용한 방법은 무엇일까요?", a:"염소 가죽과 음식으로 에서처럼 변장하여 속임"},
  {q:"형 에서를 피해 도망가던 야곱이 광야에서 돌을 베고 잠들었을 때 꿈에서 하늘과 땅을 연결하는 것을 보았는데, 그것은 무엇이었을까요?", a:"사닥다리"},
  {q:"야곱이 형 에서를 피해 도망가던 중 하나님을 만난 그 장소를 하나님의 집이라는 뜻으로 무엇이라 이름 지었을까요?", a:"벧엘"},
  {q:"라헬과 레아의 아버지이자 야곱의 외삼촌의 이름은 무엇일까요?", a:"라반"},
  {q:"야곱이 라반의 둘째딸을 얻기 위해 7년을 봉사했지만 속임을 당해 먼저 첫째딸과 결혼하게 되었고 또 7년을 봉사해서 둘째딸과 결혼하게 되었습니다. 야곱이 결국 결혼하게 된 두 자매의 이름은 무엇일까요?", a:"레아와 라헬"},
  {q:"라헬이 낳은 첫 아들로 하나님께서 더해 주시다의 의미가 담긴 이름은 무엇일까요?", a:"요셉"},
  {q:"야곱이 가축의 무늬를 이용하여 자신의 재산을 늘렸던 방법은 무엇일까요?", a:"점 있는 가축 번식"},
  {q:"점점 관계가 불편해지고 하나님의 음성을 들었던 야곱이 라반의 집을 떠나기로 결심하게 된 이유는 무엇일까요?", a:"라반의 태도 변화와 재산 문제, 하나님이 고향으로 돌아가라는 명령을 주셨기 때문"},

  {q:"가장 사랑했던 존재인 라헬의 죽음이 야곱에게 주는 의미는 무엇일까요?", a:"고통 속에서도 하나님의 계획은 계속된다"},
  {q:"요셉이 보디발 아내의 유혹을 단호히 거절하고 도망친 이유는 무엇일까요?", a:"하나님 앞에서 죄를 짓지 않기 위해"},
  {q:"리브가가 야곱을 통해 아버지의 축복을 받도록 계획한 배경에는 하나님께서 미리 주신 어떤 말씀이 있었을까요?", a:"큰 자가 어린 자를 섬기리라"},
  {q:"바로가 요셉을 총리로 세운 결정적인 이유는 무엇일까요?", a:"하나님의 지혜가 있었기 때문"},
  {q:"요셉의 삶에서 반복적으로 나타나는 특징은 무엇일까요?", a:"하나님이 함께 하심"},
  {q:"고난 속에서도 요셉이 유지한 태도는 무엇일까요?", a:"믿음과 신실함"},
  {q:"야곱이 인생의 위기와 도망의 과정 속에서 삶의 방향과 정체성의 근본적인 변화는 무엇에서 시작되었을까요?", a:"하나님과의 만남"},
  {q:"하나님과의 언약 속에서 형성되어 가는 야곱 가족 이야기는 훗날 한 민족으로 성장하여 구속사의 중심에 서게 될 어떤 역사의 출발점을 의미할까요?", a:"이스라엘 민족의 역사"},
  {q:"이해할 수 없는 고난과 억울한 상황 속에서도 하나님의 계획과 뜻은 어떻게 이루어질까요?", a:"반드시 이루어진다"},
  {q:"하나님은 연약함 가운데 저지르는 인간의 실수와 죄를 하나님의 주권과 섭리 안에서 어떻게 사용하실까요?", a:"선으로 바꾸심"},
  {q:"다시 만난 형제들 앞에서 흘린 요셉의 눈물은 단순한 감정 표현을 넘어 그들을 향한 무엇을 의미할까요?", a:"사랑과 용서"},
  {q:"야곱이 죽기 전에 아들들의 삶과 미래에 대해 예언적인 축복을 선언한 것은 무엇의 시작일까요?", a:"이스라엘의 열두 지파"}
];

let questions = [];
let current = 0;
let correctCount = 0;
let wrongCount = 0;
let wrongItems = [];
let revealed = false;
let totalCount = 100;

function selectCount(btn, count) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  totalCount = count;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  questions = shuffle(ALL_QUESTIONS).slice(0, totalCount);
  current = 0;
  correctCount = 0;
  wrongCount = 0;
  wrongItems = [];
  revealed = false;

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';

  updateScoreChips();
  renderCard();
}

function goHome() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
}

function updateScoreChips() {
  document.getElementById('score-c').textContent = correctCount;
  document.getElementById('score-w').textContent = wrongCount;
  document.getElementById('score-r').textContent = questions.length - current;

  const pct = current / questions.length * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${current} / ${questions.length}`;
}

function renderCard() {
  if (current >= questions.length) {
    showResult();
    return;
  }

  revealed = false;
  const q = questions[current];
  const area = document.getElementById('card-area');

  area.innerHTML = `
    <div class="card" id="main-card">
      <div class="card-header">
        <span class="q-number">Q. ${current + 1}</span>
        <span class="q-progress-text">${questions.length - current - 1}문제 남음</span>
      </div>
      <div class="card-body">
        <p class="question-text">${q.q}</p>
        <div class="answer-area">
          <div class="answer-label">✦ 정답</div>
          <div class="answer-text">${q.a}</div>
          <div class="answer-hidden">버튼을 눌러 정답을 확인하세요</div>
        </div>
        <div class="card-actions action-row-top">
          <button class="btn btn-reveal" id="reveal-btn" onclick="revealAnswer()">👁 정답 보기</button>
        </div>
        <div class="card-actions" id="judge-btns" style="display:none;">
          <button class="btn btn-correct" onclick="judge(true)">✅ 맞았어요</button>
          <button class="btn btn-wrong" onclick="judge(false)">❌ 틀렸어요</button>
        </div>
      </div>
    </div>
  `;
}

function revealAnswer() {
  if (revealed) return;
  revealed = true;
  document.getElementById('main-card').classList.add('revealed');
  document.getElementById('reveal-btn').style.display = 'none';
  document.getElementById('judge-btns').style.display = 'flex';
}

function judge(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCount++;
    wrongItems.push(questions[current]);
  }
  current++;
  updateScoreChips();
  renderCard();
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';

  const total = questions.length;
  const pct = Math.round(correctCount / total * 100);

  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-c').textContent = correctCount;
  document.getElementById('res-w').textContent = wrongCount;
  document.getElementById('res-total').textContent = total;

  // Animate circle
  const circle = document.getElementById('score-circle');
  circle.style.background = `conic-gradient(var(--gold) ${pct * 3.6}deg, var(--border) ${pct * 3.6}deg)`;

  // Wrong list
  const area = document.getElementById('wrong-list-area');
  if (wrongItems.length === 0) {
    area.innerHTML = '<p style="text-align:center;color:var(--correct);font-size:15px;margin-top:20px;">🎉 모두 맞혔습니다!</p>';
  } else {
    let html = `<div class="wrong-list-title">틀린 문제 ${wrongItems.length}개</div>`;
    wrongItems.forEach((item, i) => {
      html += `
        <div class="wrong-item">
          <div class="wrong-item-q">${i+1}. ${item.q}</div>
          <div class="wrong-item-a">→ ${item.a}</div>
        </div>
      `;
    });
    area.innerHTML = html;
  }
}
</script>
